<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="dl_title">Get Loop Marked</title>
    <meta name="description" content="Download the Loop Marked app for iOS and Android." />
    <link rel="icon" type="image/png" href="/images/app-icon.png" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6774259182361782"
        crossorigin="anonymous"></script>
    <style>
        .dl-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background-color: var(--primary-bg, #050508);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            padding: 40px 20px;
        }

        .dl-bg {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 1;
        }

        .hero-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            mix-blend-mode: screen;
        }

        .hero-glow-1 {
            background: radial-gradient(circle at center, #00F0FF 0%, transparent 70%);
            width: 80vw;
            height: 80vw;
            top: -40vw;
            left: -40vw;
        }

        .hero-glow-2 {
            background: radial-gradient(circle at center, #7C3AED 0%, transparent 70%);
            width: 70vw;
            height: 70vw;
            bottom: -30vw;
            right: -20vw;
        }

        .dl-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background: rgba(15, 15, 20, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 32px;
            padding: 60px 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .dl-logo {
            width: 100px;
            height: 100px;
            margin-bottom: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 240, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            margin: 0 0 16px 0;
            background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.15rem;
            line-height: 1.6;
            margin: 0 0 40px 0;
            max-width: 450px;
        }

        .store-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .store-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            width: 100%;
            padding: 18px 24px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .store-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s ease;
        }

        .store-btn:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .store-btn.apple:hover {
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
        }

        .store-btn.android:hover {
            box-shadow: 0 10px 25px rgba(0, 240, 255, 0.15);
        }

        .store-btn:hover::before {
            transform: translateX(100%);
        }

        .store-btn svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        .auth-back {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
            z-index: 20;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }

        .auth-back:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-5px);
        }

        .auth-lang {
            position: absolute;
            top: 40px;
            right: 40px;
            z-index: 20;
        }

        .lang-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-family: inherit;
        }

        @media (max-width: 768px) {
            .dl-container {
                padding: 40px 20px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .auth-back {
                top: 20px;
                left: 20px;
            }

            .auth-lang {
                top: 20px;
                right: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="dl-page">
        <div class="dl-bg">
            <div class="hero-glow hero-glow-1"></div>
            <div class="hero-glow hero-glow-2"></div>
        </div>

        <a href="/" class="auth-back">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5" />
                <polyline points="12 19 5 12 12 5" />
            </svg>
            <span data-i18n="auth_back">Home</span>
        </a>

        <!-- Language Switcher -->
        <div class="auth-lang lang-dropdown" id="lang-menu-wrapper">
            <button class="lang-btn" id="lang-menu-btn" aria-haspopup="true" aria-expanded="false">
                <span class="lang-flag" id="current-lang-flag">🇺🇸</span>
                <span id="current-lang-name">English</span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
            <div class="lang-menu" id="lang-menu" role="menu"
                style="display: none; position: absolute; right: 0; top: 100%; margin-top: 10px; background: #111; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; max-height: 400px; overflow-y: auto; z-index: 100;">
                <!-- Filled by JS -->
            </div>
        </div>

        <div class="dl-container">
            <img src="/images/app-icon.png" alt="Loop Marked Logo" class="dl-logo" />

            <h1 data-i18n="dl_title">Get Loop Marked</h1>
            <p data-i18n="dl_subtitle">The premium, privacy-first marketplace is available on iOS and Android. Download
                now to start trading safely.</p>

            <div class="store-buttons">
                <!-- APPLE APP STORE BUTTON -->
                <a href="#" class="store-btn apple" id="ios-link">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" />
                    </svg>
                    <span data-i18n="dl_ios">Download on the App Store</span>
                </a>

                <!-- GOOGLE PLAY BUTTON -->
                <a href="#" class="store-btn android" id="android-link">
                    <svg viewBox="0 0 24 24">
                        <path
                            d="M20.26 11.23L4.93 2.48c-.92-.53-1.93.07-1.93 1.14v16.76c0 1.07 1.01 1.67 1.93 1.14l15.33-8.75a1.32 1.32 0 0 0 0-2.29zM15 12l-9.58 6.06V5.94L15 12z"
                            fill="#00e676" />
                        <path d="M5.42 18.06l9.58-6.06L20.26 12l-14.84 8.52c-.22.13-.48.22-.76.24.28-.02.54-.11.76-.7z"
                            fill="#00c853" />
                        <circle cx="15" cy="12" r="3" fill="#fff" opacity="0.1" />
                    </svg>
                    <span data-i18n="dl_android">Get it on Google Play</span>
                </a>
            </div>
        </div>
    </div>

    <script type="module" src="/i18n.js"></script>
    <script>
        // Make lang switcher visible logic inline
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('lang-menu-btn');
            const menu = document.getElementById('lang-menu');
            if (btn && menu) {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
                });
                document.addEventListener('click', () => {
                    menu.style.display = 'none';
                });
            }
        });
    </script>
</body>

</html>
